name: Presto — YouTube upload

on:
  workflow_run:
    workflows: ["Presto — briefing matinal"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Installer ffmpeg (binaire statique)
        run: |
          wget -q https://github.com/BtbN/ffmpeg-builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/ffprobe
          ffmpeg -version | head -1

      - name: Définir la date
        run: echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Vérifier si déjà uploadé
        id: check
        run: |
          if [ -f "data/youtube/$DATE.json" ]; then
            echo "already_uploaded=true" >> $GITHUB_OUTPUT
            echo "Épisode $DATE déjà sur YouTube, skip."
          else
            echo "already_uploaded=false" >> $GITHUB_OUTPUT
          fi

      - name: Télécharger le MP3 depuis GitHub Releases
        if: steps.check.outputs.already_uploaded == 'false'
        run: |
          mkdir -p output/audio
          gh release download "$DATE" --pattern "*.mp3" --dir "output/audio/"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Générer la vidéo et uploader sur YouTube
        if: steps.check.outputs.already_uploaded == 'false'
        run: |
          mkdir -p data/youtube
          python tools/upload_youtube.py "output/scripts/$DATE.xml" "output/audio/$DATE.mp3"
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

      - name: Sauvegarder le record YouTube
        if: steps.check.outputs.already_uploaded == 'false'
        run: |
          if [ -f "data/youtube/$DATE.json" ]; then
            git config user.name "Presto Bot"
            git config user.email "presto-bot@noreply"
            git add "data/youtube/$DATE.json"
            git diff --cached --quiet || git commit -m "youtube: $DATE [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Alerte si échec
        if: failure()
        run: |
          gh issue create \
            --title "⚠️ YouTube upload échoué — $DATE" \
            --body "Le workflow YouTube a échoué. Voir le run : $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --label "incident" 2>/dev/null || echo "::error::YouTube upload échoué pour $DATE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
