name: Diag — clés X (jetable)

# Workflow de diagnostic NON DESTRUCTIF : teste si les clés X authentifient
# (get_me) et si la recherche est permise (tier). Ne poste AUCUN tweet.
# À supprimer une fois le diagnostic terminé.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install tweepy
      - name: Tester les clés X
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          python - <<'PY'
          import os, tweepy

          client = tweepy.Client(
              consumer_key=os.environ["TWITTER_API_KEY"],
              consumer_secret=os.environ["TWITTER_API_SECRET"],
              access_token=os.environ["TWITTER_ACCESS_TOKEN"],
              access_token_secret=os.environ["TWITTER_ACCESS_TOKEN_SECRET"],
          )

          print("=== TEST 1 : Authentification (get_me) ===")
          auth_ok = False
          try:
              me = client.get_me()
              print(f"AUTH OK -- connecte comme @{me.data.username} (id={me.data.id})")
              auth_ok = True
          except Exception as e:
              print(f"AUTH ECHEC : {type(e).__name__}: {e}")

          print("=== TEST 2 : Recherche (search_recent_tweets -- exige tier Basic) ===")
          try:
              r = client.search_recent_tweets(query="quebec", max_results=10)
              n = len(r.data or [])
              print(f"SEARCH OK -- {n} tweets (tu as un tier payant)")
          except Exception as e:
              print(f"SEARCH bloque : {type(e).__name__}: {e}")

          print("=== CONCLUSION ===")
          if auth_ok:
              print("Les cles sont VALIDES. Le tweet quotidien (create_tweet) va fonctionner.")
          else:
              print("Les cles sont REJETEES. A regenerer dans le portail X "
                    "(Read+Write puis regenerer Access Token+Secret, MAJ des secrets GitHub).")
          PY
