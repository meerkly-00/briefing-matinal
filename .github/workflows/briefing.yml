name: Briefing matinal

on:
  schedule:
    - cron: '0 10 * * *'  # 6h00 EST (UTC-4 en été)
  workflow_dispatch:       # bouton Run manuel dans GitHub

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt
      - run: sudo apt-get install -y ffmpeg -q

      - name: Générer le briefing
        run: |
          DATE=$(date +%Y-%m-%d)
          export AUDIO_BASE_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$DATE"
          echo "DATE=$DATE" >> $GITHUB_ENV
          python run.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PODCAST_TITLE: Briefing matinal
          PODCAST_DESCRIPTION: Briefing radio matinal francophone québécois.
          CLAUDE_MODEL: claude-sonnet-4-6
          TTS_VOICE: fr-CA-AntoineNeural
          BRIEFING_DUREE_CIBLE: "12"
          BRIEFING_FENETRE_HEURES: "24"

      - name: Publier le MP3 sur GitHub Releases
        run: |
          gh release create "$DATE" \
            --title "Briefing du $DATE" \
            --notes "Briefing automatisé" \
            "output/audio/$DATE.mp3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sauvegarder feed.xml et contexte
        run: |
          git config user.name "Briefing Bot"
          git config user.email "briefing-bot@noreply"
          git add feed.xml data/context.json
          git diff --cached --quiet || git commit -m "briefing: $DATE [skip ci]"
          git push
