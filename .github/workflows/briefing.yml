name: Presto — briefing matinal

on:
  schedule:
    - cron: '0 8 * * *'   # 4h00 EDT (UTC-4) — filet de sécurité si cron-job.org échoue
  workflow_dispatch:       # bouton Run manuel dans GitHub

permissions:
  contents: write

jobs:
  presto:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt
      - name: Installer ffmpeg (binaire statique)
        run: |
          wget -q https://github.com/BtbN/ffmpeg-builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/ffprobe
          ffmpeg -version | head -1

      - name: Générer le Presto du jour
        run: |
          DATE=$(date +%Y-%m-%d)
          export AUDIO_BASE_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$DATE"
          echo "DATE=$DATE" >> $GITHUB_ENV
          python run.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PODCAST_TITLE: Presto
          PODCAST_DESCRIPTION: "Briefing matinal francophone québécois : actualité, politique, économie, marchés et tech en 15 à 18 minutes. Les épisodes restent disponibles 7 jours."
          PODCAST_BASE_URL: https://prestopodcast.online
          PODCAST_ARTWORK_URL: https://www.prestopodcast.online/artwork.jpg
          PODCAST_AUTHOR: Presto
          EPISODE_TITLE_PREFIX: "Presto — édition du"
          SYSTEM_PROMPT_FILE: prompts/system_presto_v1.md
          CLAUDE_MODEL: claude-sonnet-4-6
          TTS_PROVIDER: openai
          TTS_MODEL: tts-1
          TTS_VOICE: onyx
          BRIEFING_DUREE_CIBLE: "17"
          BRIEFING_FENETRE_HEURES: "24"
          FEED_KEEP_DAYS: "7"

      - name: Publier le MP3
        run: |
          if gh release view "$DATE" > /dev/null 2>&1; then
            gh release upload "$DATE" "output/audio/$DATE.mp3" --clobber
          else
            gh release create "$DATE" \
              --title "Presto — édition du $DATE" \
              --notes "Épisode automatisé Presto" \
              "output/audio/$DATE.mp3"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sauvegarder feed.xml et contexte
        run: |
          git config user.name "Presto Bot"
          git config user.email "presto-bot@noreply"
          git add feed.xml data/context.json
          git diff --cached --quiet || git commit -m "presto: $DATE [skip ci]"
          git push
